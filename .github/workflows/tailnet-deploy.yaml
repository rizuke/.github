name: Deploy to homelab

on:
  workflow_call:
    inputs:
      image-name:
        description: Name of the image to deploy
        required: true
        type: string
      container-name:
        description: Name of the container to run
        required: true
        type: string
      container-network:
        description: Docker network to attach the container to
        required: false
        type: string
        default: ""
      deploy-secondary:
        description: Whether to also deploy to the secondary node
        required: false
        type: boolean
        default: false
    secrets:
      deploy-ssh-user:
        required: true
      deploy-node-primary:
        required: true
      deploy-node-secondary:
        required: false
      ts-oauth-client-id:
        required: true
      ts-audience:
        required: true

jobs:
  deploy-primary:
    name: Deploy to primary node
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.ts-oauth-client-id }}
          audience: ${{ secrets.ts-audience }}
          tags: tag:ci

      - name: Deploy
        env:
          IMAGE: ghcr.io/${{ github.repository }}/${{ inputs.image-name }}:latest
          CONTAINER_NAME: ${{ inputs.container-name }}
          CONTAINER_NETWORK: ${{ inputs.container-network }}
          DEPLOY_SSH_USER: ${{ secrets.deploy-ssh-user }}
          DEPLOY_NODE: ${{ secrets.deploy-node-primary }}
        run: |
          NETWORK_ARG=""
          if [ -n "$CONTAINER_NETWORK" ]; then
            NETWORK_ARG="--network $CONTAINER_NETWORK"
          fi

          ssh -o StrictHostKeyChecking=no "$DEPLOY_SSH_USER"@"$DEPLOY_NODE" "
            docker pull $IMAGE
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true
            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              $NETWORK_ARG \
              $IMAGE
          "

  deploy-secondary:
    name: Deploy to secondary node
    runs-on: ubuntu-latest
    if: ${{ inputs.deploy-secondary }}
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.ts-oauth-client-id }}
          audience: ${{ secrets.ts-audience }}
          tags: tag:ci

      - name: Deploy
        env:
          IMAGE: ghcr.io/${{ github.repository }}/${{ inputs.image-name }}:latest
          CONTAINER_NAME: ${{ inputs.container-name }}
          CONTAINER_NETWORK: ${{ inputs.container-network }}
          DEPLOY_SSH_USER: ${{ secrets.deploy-ssh-user }}
          DEPLOY_NODE: ${{ secrets.deploy-node-secondary }}
        run: |
          NETWORK_ARG=""
          if [ -n "$CONTAINER_NETWORK" ]; then
            NETWORK_ARG="--network $CONTAINER_NETWORK"
          fi

          ssh -o StrictHostKeyChecking=no "$DEPLOY_SSH_USER"@"$DEPLOY_NODE" "
            docker pull $IMAGE
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true
            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              $NETWORK_ARG \
              $IMAGE
          "