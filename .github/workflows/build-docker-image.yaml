name: Build and push devcontainer image

on:
  workflow_call:
    inputs:
      image-name:
        description: Name of the image
        required: true
        type: string
      context:
        description: Docker build context path
        required: true
        type: string
      dockerfile:
        description: Path to Dockerfile
        required: true
        type: string
      multi-arch:
        description: Enable multi-arch builds via QEMU
        required: false
        type: boolean
        default: false
    secrets:
      token:
        required: true

jobs:
  build-and-push:
    name: Build and push

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Migrate to native runners.
      - name: Set up QEMU
        if: inputs.multi-arch
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ inputs.image-name }}:latest
            ghcr.io/${{ github.repository }}/${{ inputs.image-name }}:${{ github.sha }}
          platforms: ${{ inputs.multi-arch && 'linux/amd64,linux/arm64' || 'linux/amd64' }}